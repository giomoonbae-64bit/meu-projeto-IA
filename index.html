<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Giovanna Maria Pereira — Reconhecimento de Imagem</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Pacifico&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --pink:    #ffb3d9;
      --pink2:   #ff85c2;
      --blue:    #b3e5fc;
      --blue2:   #64d0f5;
      --mint:    #b2f5e4;
      --lavender:#d5b3f7;
      --text:    #5a2060;
      --muted:   #b07cc6;
      --card:    rgba(255,255,255,0.72);
      --border:  rgba(255,179,217,.45);
      --glow:    rgba(255,130,200,.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      background: linear-gradient(120deg,
        #ffe0f5 0%, #d6f0ff 25%, #f0e0ff 50%, #d6fff5 75%, #fff0e0 100%);
      background-size: 300% 300%;
      animation: bgShift 12s ease infinite;
    }

    @keyframes bgShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .star {
      position: absolute;
      animation: starFloat linear infinite;
      opacity: 0;
    }
    @keyframes starFloat {
      0%   { transform: translateY(100vh) rotate(0deg);   opacity: 0; }
      10%  { opacity: .8; }
      90%  { opacity: .5; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    header {
      position: relative;
      padding: 3.5rem 1.5rem 2rem;
      text-align: center;
      z-index: 1;
    }
    .heart-emoji {
      font-size: 2.2rem;
      display: block;
      margin-bottom: .5rem;
      letter-spacing: .3rem;
      animation: heartPulse 1.6s ease-in-out infinite;
    }
    @keyframes heartPulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.18); }
    }
    .site-title {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.8rem, 5.5vw, 3.2rem);
      line-height: 1.2;
      background: linear-gradient(90deg,
        var(--pink2) 0%, var(--lavender) 35%, var(--blue2) 65%, var(--mint) 100%);
      background-size: 200%;
      animation: titleShimmer 5s ease infinite;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 8px rgba(255,130,200,.3));
    }
    @keyframes titleShimmer {
      0%   { background-position: 0%; }
      50%  { background-position: 100%; }
      100% { background-position: 0%; }
    }
    .site-subtitle {
      margin-top: .6rem;
      font-size: .85rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }
    header::after {
      content: '';
      display: block;
      width: 100px; height: 3px;
      background: linear-gradient(90deg, var(--pink), var(--lavender), var(--blue));
      border-radius: 2px;
      margin: 1.2rem auto 0;
    }

    .main-card {
      position: relative;
      z-index: 1;
      background: var(--card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 2.5px solid var(--border);
      border-radius: 2rem;
      padding: 2.5rem 2rem;
      box-shadow:
        0 8px 40px rgba(255,130,200,.2),
        0 2px 0 rgba(255,255,255,.8) inset;
      max-width: 520px;
      margin: 0 auto;
    }

    #webcam-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 210px;
    }
    #webcam-container canvas {
      border-radius: 1rem;
      border: 3px solid var(--pink);
      box-shadow: 0 0 30px var(--glow), 0 0 60px rgba(100,208,245,.25);
      max-width: 100%;
    }
    .cam-placeholder {
      width: 200px; height: 200px;
      border-radius: 1rem;
      border: 2.5px dashed var(--pink2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      color: var(--muted);
      background: rgba(255,179,217,.08);
    }
    .cam-placeholder .cam-icon { font-size: 2.5rem; }
    .cam-placeholder span { font-size: .8rem; letter-spacing: .05em; font-weight: 700; }

    .btn-start {
      display: inline-flex;
      align-items: center;
      gap: .65rem;
      padding: .9rem 2.4rem;
      border-radius: 3rem;
      border: none;
      background: linear-gradient(135deg, var(--pink2) 0%, var(--lavender) 50%, var(--blue2) 100%);
      background-size: 200%;
      animation: btnShimmer 4s ease infinite;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: .04em;
      cursor: pointer;
      box-shadow: 0 4px 20px var(--glow), 0 2px 0 rgba(255,255,255,.3) inset;
      transition: transform .2s, box-shadow .2s;
      text-shadow: 0 1px 4px rgba(90,32,96,.25);
    }
    @keyframes btnShimmer {
      0%   { background-position: 0%; }
      50%  { background-position: 100%; }
      100% { background-position: 0%; }
    }
    .btn-start:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 10px 32px var(--glow);
    }
    .btn-start:active { transform: scale(.97); }
    .btn-start.running {
      background: linear-gradient(135deg, var(--blue2) 0%, var(--mint) 50%, var(--lavender) 100%);
    }

    .label-section-title {
      font-family: 'Pacifico', cursive;
      font-size: 1.05rem;
      background: linear-gradient(90deg, var(--pink2), var(--blue2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      border-bottom: 2px dashed rgba(255,179,217,.5);
      padding-bottom: .5rem;
    }
    .ornament {
      text-align: center;
      font-size: .9rem;
      color: var(--muted);
      letter-spacing: .15em;
      font-weight: 700;
    }
    .prediction-item { display: flex; flex-direction: column; gap: .35rem; }
    .prediction-header { display: flex; justify-content: space-between; align-items: center; }
    .class-name {
      font-size: .85rem;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--text);
      font-weight: 800;
    }
    .class-pct {
      font-family: 'Pacifico', cursive;
      font-size: .9rem;
      color: var(--pink2);
      min-width: 3.5rem;
      text-align: right;
    }
    .progress {
      height: 10px;
      border-radius: 5px;
      background: rgba(255,179,217,.2);
      overflow: hidden;
    }
    .progress-bar {
      border-radius: 5px;
      background: linear-gradient(90deg, var(--pink), var(--lavender), var(--blue2));
      background-size: 200%;
      animation: barShimmer 3s ease infinite;
      box-shadow: 0 0 8px var(--glow);
      transition: width .35s cubic-bezier(.4,0,.2,1);
    }
    @keyframes barShimmer {
      0%   { background-position: 0%; }
      50%  { background-position: 100%; }
      100% { background-position: 0%; }
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem 1rem;
      font-size: .8rem;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: .06em;
    }

    @media (max-width: 576px) {
      .main-card { padding: 1.75rem 1.25rem; border-radius: 1.25rem; }
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<header>
  <span class="heart-emoji">💗 💕 💗</span>
  <h1 class="site-title">Giovanna Maria Pereira</h1>
  <p class="site-subtitle">✨ Reconhecimento de Imagem com IA ✨</p>
</header>

<main class="container pb-5">
  <div class="main-card">

    <div id="webcam-container" class="mb-4">
      <div class="cam-placeholder" id="cam-placeholder">
        <span class="cam-icon">📷</span>
        <span>Câmera inativa</span>
      </div>
    </div>

    <div class="d-flex justify-content-center mb-4">
      <button class="btn-start" id="startBtn" onclick="init()">
        <span>🌈</span>
        <span id="btnText">Ativar câmera</span>
      </button>
    </div>

    <div id="results-section" style="display:none;">
      <div class="ornament mb-3">🍭 — Análise — 🍭</div>
      <p class="label-section-title mb-3">Correspondências detectadas</p>
      <div id="label-container" class="d-flex flex-column gap-3"></div>
    </div>

  </div>
</main>

<footer>
  🌸 Powered by TensorFlow.js &amp; Teachable Machine · Giovanna Maria Pereira © 2025 🌸
</footer>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
  const starChars = ['💗','💕','💖','✨','🌸','💓','💝','🌟','💞','🍭','💫','🌺'];
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 32; i++) {
    const s = document.createElement('span');
    s.className = 'star';
    s.textContent = starChars[Math.floor(Math.random() * starChars.length)];
    s.style.left      = Math.random() * 100 + 'vw';
    s.style.fontSize  = (0.7 + Math.random() * 1.3) + 'rem';
    const dur = 9 + Math.random() * 14;
    s.style.animationDuration = dur + 's';
    s.style.animationDelay   = -(Math.random() * dur) + 's';
    starsEl.appendChild(s);
  }

  const URL = "https://teachablemachine.withgoogle.com/models/XzS1lPUia/";
  let model, webcam, labelContainer, maxPredictions;
  let progressBars = [];

  async function init() {
    const btn    = document.getElementById('startBtn');
    const btnTxt = document.getElementById('btnText');
    btn.classList.add('running');
    btnTxt.textContent = 'Carregando…';
    btn.disabled = true;

    model = await tmImage.load(URL + "model.json", URL + "metadata.json");
    maxPredictions = model.getTotalClasses();

    webcam = new tmImage.Webcam(200, 200, true);
    await webcam.setup();
    await webcam.play();
    window.requestAnimationFrame(loop);

    const placeholder = document.getElementById('cam-placeholder');
    if (placeholder) placeholder.remove();
    document.getElementById('webcam-container').appendChild(webcam.canvas);

    labelContainer = document.getElementById('label-container');
    labelContainer.innerHTML = '';
    progressBars = [];

    for (let i = 0; i < maxPredictions; i++) {
      const item = document.createElement('div');
      item.className = 'prediction-item';

      const header = document.createElement('div');
      header.className = 'prediction-header';

      const nameEl = document.createElement('span');
      nameEl.className = 'class-name';
      nameEl.textContent = '—';

      const pctEl = document.createElement('span');
      pctEl.className = 'class-pct';
      pctEl.textContent = '0%';

      header.appendChild(nameEl);
      header.appendChild(pctEl);

      const progressWrap = document.createElement('div');
      progressWrap.className = 'progress';

      const bar = document.createElement('div');
      bar.className = 'progress-bar';
      bar.style.width = '0%';
      bar.setAttribute('role', 'progressbar');
      bar.setAttribute('aria-valuenow', '0');
      bar.setAttribute('aria-valuemin', '0');
      bar.setAttribute('aria-valuemax', '100');

      progressWrap.appendChild(bar);
      item.appendChild(header);
      item.appendChild(progressWrap);
      labelContainer.appendChild(item);
      progressBars.push({ nameEl, pctEl, bar });
    }

    document.getElementById('results-section').style.display = 'block';
    btnTxt.textContent = 'Câmera ativa ✨';
  }

  async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
  }

  async function predict() {
    const prediction = await model.predict(webcam.canvas);
    for (let i = 0; i < maxPredictions; i++) {
      const pct = (prediction[i].probability * 100).toFixed(1);
      progressBars[i].nameEl.textContent = prediction[i].className;
      progressBars[i].pctEl.textContent  = pct + '%';
      progressBars[i].bar.style.width    = pct + '%';
      progressBars[i].bar.setAttribute('aria-valuenow', pct);
    }
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
