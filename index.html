<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEU NOME - Classificador de Imagens</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root {
      --primary: #6C63FF;
      --primary-dark: #4B44CC;
      --accent: #FF6584;
      --bg: #f4f6fb;
      --card-bg: #ffffff;
      --text-main: #22213a;
      --text-muted: #7b7b9d;
      --radius: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text-main);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #fff;
      padding: 2rem 1.5rem 2.5rem;
      text-align: center;
      clip-path: ellipse(110% 100% at 50% 0%);
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    header p {
      font-size: 1rem;
      opacity: 0.85;
      margin-top: 0.35rem;
    }

    .badge-tag {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 4px 14px;
      font-size: 0.78rem;
      margin-top: 0.75rem;
      letter-spacing: 0.5px;
    }

    .main-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(108,99,255,0.10), 0 2px 8px rgba(0,0,0,0.05);
      padding: 2rem;
      margin-top: -1.5rem;
    }

    /* --- Camera button --- */
    #btn-start {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 0.85rem 2.2rem;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 18px rgba(108,99,255,0.35);
      width: 100%;
      max-width: 320px;
      letter-spacing: 0.2px;
    }

    #btn-start:hover {
      background: var(--primary-dark);
      box-shadow: 0 6px 24px rgba(108,99,255,0.45);
      transform: translateY(-1px);
    }

    #btn-start:active { transform: scale(0.97); }

    #btn-start .btn-icon {
      width: 30px;
      height: 30px;
      background: rgba(255,255,255,0.18);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    #btn-start.running {
      background: #e74c3c;
      box-shadow: 0 4px 18px rgba(231,76,60,0.35);
    }

    #btn-start.running:hover {
      background: #c0392b;
      box-shadow: 0 6px 24px rgba(231,76,60,0.45);
    }

    /* --- Webcam --- */
    #webcam-wrapper {
      display: none;
      justify-content: center;
      align-items: center;
    }

    #webcam-wrapper.visible { display: flex; }

    #webcam-container canvas {
      border-radius: 16px;
      box-shadow: 0 6px 28px rgba(108,99,255,0.18);
      max-width: 100%;
      height: auto;
      display: block;
    }

    /* --- Status badge --- */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 50px;
      padding: 4px 14px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .status-badge.idle    { background: #f0f0f7; color: var(--text-muted); }
    .status-badge.loading { background: #fff3e0; color: #e67e22; }
    .status-badge.live    { background: #e8f8f0; color: #27ae60; }
    .status-badge.error   { background: #fdecea; color: #e74c3c; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .status-badge.live .status-dot { animation: pulse 1.2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* --- Labels / progress bars --- */
    #label-container { display: none; }
    #label-container.visible { display: block; }

    .prediction-item {
      margin-bottom: 1rem;
    }

    .prediction-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .prediction-name {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text-main);
    }

    .prediction-percent {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--primary);
      min-width: 44px;
      text-align: right;
    }

    .prediction-bar-track {
      height: 10px;
      background: #ece9ff;
      border-radius: 50px;
      overflow: hidden;
    }

    .prediction-bar-fill {
      height: 100%;
      border-radius: 50px;
      background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
      transition: width 0.25s ease;
      width: 0%;
    }

    /* top prediction highlight */
    .prediction-item.top-match .prediction-bar-fill {
      background: linear-gradient(90deg, #27ae60 0%, #2ecc71 100%);
    }

    .prediction-item.top-match .prediction-percent {
      color: #27ae60;
    }

    /* --- Section label --- */
    .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    /* --- Divider --- */
    .my-divider {
      border: none;
      border-top: 1.5px dashed #e0dff7;
      margin: 1.5rem 0;
    }

    /* --- Footer --- */
    footer {
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-muted);
      padding: 1.5rem 1rem 2rem;
    }

    @media (max-width: 576px) {
      header h1 { font-size: 1.5rem; }
      .main-card { padding: 1.25rem; border-radius: 14px; }
      #btn-start { font-size: 0.97rem; padding: 0.75rem 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="badge-tag"><i class="bi bi-camera-fill me-1"></i>Visão Computacional</div>
    <h1 class="mt-2">SEU NOME</h1>
    <p>Classificação de imagens com Teachable Machine</p>
  </header>

  <!-- MAIN -->
  <div class="container py-4" style="max-width: 600px;">
    <div class="main-card">

      <!-- Status -->
      <div class="d-flex align-items-center justify-content-between mb-4">
        <span class="section-label mb-0">Classificador</span>
        <span class="status-badge idle" id="status-badge">
          <span class="status-dot"></span>
          <span id="status-text">Aguardando</span>
        </span>
      </div>

      <!-- Start button -->
      <div class="d-flex justify-content-center mb-4">
        <button id="btn-start" onclick="handleToggle()">
          <span class="btn-icon"><i class="bi bi-camera-video-fill" id="btn-icon"></i></span>
          <span id="btn-label">Permitir câmera e iniciar</span>
        </button>
      </div>

      <!-- Webcam -->
      <div id="webcam-wrapper" class="mb-4">
        <div id="webcam-container"></div>
      </div>

      <!-- Results -->
      <div id="label-container">
        <hr class="my-divider" />
        <p class="section-label">Resultados</p>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    Powered by <strong>Teachable Machine</strong> &amp; TensorFlow.js &nbsp;·&nbsp; SEU NOME &copy; 2025
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script>
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/m2kR_izoX/";

    let model, webcam, maxPredictions;
    let running = false;

    const btnStart      = document.getElementById('btn-start');
    const btnLabel      = document.getElementById('btn-label');
    const btnIcon       = document.getElementById('btn-icon');
    const statusBadge   = document.getElementById('status-badge');
    const statusText    = document.getElementById('status-text');
    const webcamWrapper = document.getElementById('webcam-wrapper');
    const webcamCont    = document.getElementById('webcam-container');
    const labelCont     = document.getElementById('label-container');

    function setStatus(state, text) {
      statusBadge.className = 'status-badge ' + state;
      statusBadge.innerHTML = `<span class="status-dot"></span><span>${text}</span>`;
    }

    async function handleToggle() {
      if (!running) {
        await init();
      } else {
        stopWebcam();
      }
    }

    async function init() {
      try {
        setStatus('loading', 'Carregando modelo…');
        btnStart.disabled = true;

        const modelURL    = MODEL_URL + "model.json";
        const metadataURL = MODEL_URL + "metadata.json";

        model         = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(300, 300, flip);
        await webcam.setup();
        await webcam.play();

        webcamCont.innerHTML = '';
        webcamCont.appendChild(webcam.canvas);
        webcamWrapper.classList.add('visible');

        buildBars();
        labelCont.classList.add('visible');

        running = true;
        btnStart.disabled  = false;
        btnStart.classList.add('running');
        btnLabel.textContent = 'Parar câmera';
        btnIcon.className    = 'bi bi-stop-circle-fill';
        setStatus('live', 'Ao vivo');

        window.requestAnimationFrame(loop);
      } catch (err) {
        console.error(err);
        setStatus('error', 'Erro ao iniciar');
        btnStart.disabled = false;
        btnLabel.textContent = 'Tentar novamente';
      }
    }

    function stopWebcam() {
      if (webcam) { webcam.stop(); }
      running = false;
      webcamWrapper.classList.remove('visible');
      labelCont.classList.remove('visible');
      webcamCont.innerHTML = '';
      btnStart.classList.remove('running');
      btnLabel.textContent = 'Permitir câmera e iniciar';
      btnIcon.className    = 'bi bi-camera-video-fill';
      setStatus('idle', 'Aguardando');
    }

    function buildBars() {
      // Keep only the section label (first child), remove old bars
      while (labelCont.children.length > 1) {
        labelCont.removeChild(labelCont.lastChild);
      }
      for (let i = 0; i < maxPredictions; i++) {
        const item = document.createElement('div');
        item.className = 'prediction-item';
        item.id = 'pred-' + i;
        item.innerHTML = `
          <div class="prediction-header">
            <span class="prediction-name" id="name-${i}">Classe ${i + 1}</span>
            <span class="prediction-percent" id="pct-${i}">0%</span>
          </div>
          <div class="prediction-bar-track">
            <div class="prediction-bar-fill" id="bar-${i}"></div>
          </div>`;
        labelCont.appendChild(item);
      }
    }

    async function loop() {
      if (!running) return;
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);
      let topIdx = 0;
      let topVal = 0;

      for (let i = 0; i < maxPredictions; i++) {
        if (prediction[i].probability > topVal) {
          topVal = prediction[i].probability;
          topIdx = i;
        }
      }

      for (let i = 0; i < maxPredictions; i++) {
        const prob = prediction[i].probability;
        const pct  = (prob * 100).toFixed(1) + '%';

        document.getElementById('name-' + i).textContent = prediction[i].className;
        document.getElementById('pct-'  + i).textContent = pct;
        document.getElementById('bar-'  + i).style.width = pct;

        const item = document.getElementById('pred-' + i);
        if (i === topIdx) {
          item.classList.add('top-match');
        } else {
          item.classList.remove('top-match');
        }
      }
    }
  </script>
</body>
</html>
